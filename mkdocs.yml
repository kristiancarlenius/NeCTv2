site_name: NeCTv2
site_description: Neural Computed Tomography v2 — implicit neural representation reconstruction for static and dynamic CT
site_author: Kristian Carlenius
repo_url: https://github.com/kristiancarlenius/NeCTv2
repo_name: kristiancarlenius/NeCTv2
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: userguide/start/index.md
    - Installation: userguide/start/installation.md
    - Quick Start: userguide/start/quickstart.md
    - Geometry: userguide/geometry.md
    - Configuration: userguide/config.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kristiancarlenius/NeCTv2
