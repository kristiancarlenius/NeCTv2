# Default configuration for MixedCubes.
#
# CombinedCubes topology (3x 2D temporal + 1x 3D spatial) but the three
# 2D encoders use collision-free dense grids instead of hash grids.
# The 3D spatial encoder stays as a hash grid (dense 3D would be too large).
#
# encoder     → HashEncoderConfig  (3D hash for z,y,x)
# encoder_2d  → DenseGridEncoderConfig  (dense 2D for zt, yt, xt)

encoder:
  otype: HashGrid
  n_levels: 23
  n_features_per_level: 4
  log2_hashmap_size: 23
  base_resolution: 16
  max_resolution_factor: 2

encoder_2d:
  n_levels: 10
  n_features_per_level: 4
  base_resolution: 16
  per_level_scale: 1.5

net:
  otype: FullyFusedMLP
  activation: LeakyReLU
  output_activation: None
  n_neurons: 128
  n_hidden_layers: 4
  include_identity: False

model: mixedcubes
base_lr: 0.0002
batch_per_proj: 1
warmup:
  steps: 2000
  lr0: 0.0001
  otype: linear
